<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-panel">
            <div class="hud-row">
                <label for="speed-slider">Speed:</label>
                <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
                <span id="speed-value">1.0x</span>
            </div>
            <div class="hud-row">
                <button id="pause-btn" class="hud-btn">⏸ Pause</button>
                <button id="reset-cam-btn" class="hud-btn">📷 Reset View</button>
            </div>
            <div class="hud-row">
                <label class="toggle-label">
                    <input type="checkbox" id="orbit-toggle" checked>
                    <span>Show Orbits</span>
                </label>
            </div>
            <div class="hud-row">
                <label class="toggle-label">
                    <input type="checkbox" id="labels-toggle" checked>
                    <span>Show Labels</span>
                </label>
            </div>
        </div>
    </div>

    <div id="planet-info" class="hidden">
        <div class="info-panel">
            <button id="info-close" class="info-close">&times;</button>
            <h2 id="info-name"></h2>
            <div class="info-row">
                <span class="info-label">Diameter:</span>
                <span id="info-diameter"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Distance from Sun:</span>
                <span id="info-distance"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Orbital Period:</span>
                <span id="info-period"></span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="main.js"></script>
</body>
</html>
