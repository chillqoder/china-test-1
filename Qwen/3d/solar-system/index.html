<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="canvas-container"></div>

  <div id="hud">
    <div class="hud-panel">
      <h2>Solar System</h2>
      <div class="control-group">
        <label for="speed-slider">Speed</label>
        <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
        <span id="speed-value">1.0x</span>
      </div>
      <div class="control-group buttons">
        <button id="btn-pause">Pause</button>
        <button id="btn-reset">Reset Camera</button>
      </div>
      <div class="control-group buttons">
        <button id="btn-toggle-orbits" class="active">Orbits: ON</button>
        <button id="btn-toggle-labels" class="active">Labels: ON</button>
      </div>
    </div>
  </div>

  <div id="planet-tooltip" class="hidden">
    <h3 id="tooltip-name"></h3>
    <div id="tooltip-stats"></div>
  </div>

  <div id="labels-container"></div>

  <!-- Three.js r128 — classic global builds (works with file://) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="main.js"></script>
</body>
</html>
