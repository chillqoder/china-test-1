<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Three.js library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls plugin from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <!-- Main 3D canvas container -->
    <div id="canvas-container"></div>

    <!-- HUD Overlay -->
    <div id="hud">
        <!-- Speed control section -->
        <div class="hud-section">
            <label for="speed-slider">Simulation Speed</label>
            <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
            <span id="speed-value">1x</span>
        </div>

        <!-- Toggle buttons -->
        <div class="hud-section buttons">
            <button id="toggle-orbits">Hide Orbits</button>
            <button id="toggle-labels">Show Labels</button>
            <button id="reset-camera">Reset Camera</button>
        </div>
    </div>

    <!-- Planet info tooltip -->
    <div id="planet-info" class="hidden">
        <h2 id="planet-name"></h2>
        <div class="info-row">
            <span class="label">Diameter:</span>
            <span id="planet-diameter"></span>
        </div>
        <div class="info-row">
            <span class="label">Distance from Sun:</span>
            <span id="planet-distance"></span>
        </div>
        <div class="info-row">
            <span class="label">Orbital Period:</span>
            <span id="planet-period"></span>
        </div>
    </div>

    <!-- Main JavaScript file -->
    <script src="main.js"></script>
</body>
</html>
