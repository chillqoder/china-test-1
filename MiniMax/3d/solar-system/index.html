<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #020210; font-family: 'Courier New', monospace; color: #e0e8ff; }
        #canvas-container { position: fixed; inset: 0; }
        #canvas-container canvas { display: block; }
        #hud {
            position: fixed; top: 20px; left: 20px;
            background: rgba(10, 15, 40, 0.85);
            border: 1px solid rgba(100, 140, 255, 0.3);
            border-radius: 12px; padding: 20px; min-width: 220px;
            backdrop-filter: blur(10px); z-index: 100;
        }
        .hud-title { font-size: 14px; font-weight: bold; letter-spacing: 3px; margin-bottom: 16px; color: #7aa2ff; text-align: center; }
        .control-group { margin-bottom: 14px; }
        .control-group label { display: block; font-size: 11px; letter-spacing: 1px; margin-bottom: 6px; color: #8899bb; }
        .control-group input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; appearance: none; background: rgba(100, 140, 255, 0.2); border-radius: 3px; outline: none; }
        .control-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #7aa2ff; border-radius: 50%; cursor: pointer; }
        .control-group input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: #7aa2ff; border-radius: 50%; cursor: pointer; border: none; }
        #speed-value { display: inline-block; font-size: 12px; margin-top: 6px; color: #aabbff; }
        .button-group { display: flex; flex-direction: column; gap: 8px; }
        .button-group button {
            background: rgba(60, 80, 160, 0.4); border: 1px solid rgba(100, 140, 255, 0.4);
            color: #c0d0ff; padding: 10px 14px; border-radius: 6px; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 1px; transition: all 0.2s ease;
        }
        .button-group button:hover { background: rgba(80, 100, 200, 0.5); border-color: rgba(120, 160, 255, 0.6); color: #ffffff; }
        .button-group button:active { transform: scale(0.98); }
        #tooltip { position: fixed; background: rgba(10, 15, 40, 0.92); border: 1px solid rgba(100, 140, 255, 0.4); border-radius: 10px; padding: 16px 20px; pointer-events: none; z-index: 200; backdrop-filter: blur(8px); max-width: 280px; }
        #tooltip.hidden { display: none; }
        #tooltip-name { font-size: 18px; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; color: #aaccff; }
        #tooltip-stats { font-size: 12px; line-height: 1.7; color: #8899bb; }
        #tooltip-stats span { color: #c0d0ff; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div class="hud-title">SOLAR SYSTEM</div>
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed-slider" min="0" max="10" value="3" step="0.1">
            <span id="speed-value">3.0x</span>
        </div>
        <div class="button-group">
            <button id="toggle-orbits">Toggle Orbits</button>
            <button id="toggle-labels">Toggle Labels</button>
            <button id="reset-camera">Reset Camera</button>
        </div>
    </div>
    <div id="tooltip" class="hidden">
        <div id="tooltip-name"></div>
        <div id="tooltip-stats"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const PLANET_DATA = [
            { name: 'Mercury', radius: 0.8, distance: 28, color: 0xb5b5b5, speed: 0.04, rotationSpeed: 0.005, diameter: '4,879 km', distanceFromSun: '58M km', orbitalPeriod: '88 days' },
            { name: 'Venus', radius: 1.2, distance: 36, color: 0xe6c87a, speed: 0.015, rotationSpeed: 0.002, diameter: '12,104 km', distanceFromSun: '108M km', orbitalPeriod: '225 days' },
            { name: 'Earth', radius: 1.3, distance: 46, color: 0x4a90d9, speed: 0.01, rotationSpeed: 0.02, diameter: '12,742 km', distanceFromSun: '150M km', orbitalPeriod: '365 days', hasMoon: true },
            { name: 'Mars', radius: 1.0, distance: 60, color: 0xc1440e, speed: 0.008, rotationSpeed: 0.018, diameter: '6,779 km', distanceFromSun: '228M km', orbitalPeriod: '687 days' },
            { name: 'Jupiter', radius: 5.0, distance: 90, color: 0xd4a574, speed: 0.002, rotationSpeed: 0.04, diameter: '139,820 km', distanceFromSun: '778M km', orbitalPeriod: '4,333 days' },
            { name: 'Saturn', radius: 4.2, distance: 130, color: 0xf4d59e, speed: 0.0009, rotationSpeed: 0.035, diameter: '116,460 km', distanceFromSun: '1.4B km', orbitalPeriod: '10,759 days', hasRings: true },
            { name: 'Uranus', radius: 2.5, distance: 165, color: 0xb5e3e3, speed: 0.0004, rotationSpeed: 0.03, diameter: '50,724 km', distanceFromSun: '2.8B km', orbitalPeriod: '30,687 days', axialTilt: true },
            { name: 'Neptune', radius: 2.3, distance: 195, color: 0x4b70dd, speed: 0.0001, rotationSpeed: 0.028, diameter: '49,244 km', distanceFromSun: '4.5B km', orbitalPeriod: '60,190 days' }
        ];

        let scene, camera, renderer, controls;
        let planets = [];
        let orbits = [];
        let labels = [];
        let moonMesh = null;
        let asteroidBelt = null;
        let speedMultiplier = 3;
        let orbitsVisible = true;
        let labelsVisible = true;
        let raycaster, mouse;
        const clock = new THREE.Clock();

        const tooltip = document.getElementById('tooltip');
        const tooltipName = document.getElementById('tooltip-name');
        const tooltipStats = document.getElementById('tooltip-stats');
        const initialCameraPosition = new THREE.Vector3(0, 150, 250);
        const initialControlsTarget = new THREE.Vector3(0, 0, 0);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020210);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.copy(initialCameraPosition);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.copy(initialControlsTarget);

            raycaster = new THREE.Raycaster();
            raycaster.params.Points.threshold = 2;
            mouse = new THREE.Vector2();

            createStarfield();
            createLighting();
            createSun();
            createPlanets();
            createAsteroidBelt();
            setupEventListeners();
            animate();
        }

        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starPositions = [];
            const starColors = [];

            for (let i = 0; i < 4000; i++) {
                const radius = 800 + Math.random() * 400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                starPositions.push(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi));

                const brightness = 0.5 + Math.random() * 0.5;
                const tint = Math.random();
                if (tint < 0.1) starColors.push(brightness, brightness * 0.8, brightness * 0.6);
                else if (tint < 0.2) starColors.push(brightness * 0.8, brightness * 0.9, brightness);
                else starColors.push(brightness, brightness, brightness);
            }

            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            starsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
            const starsMaterial = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.9 });
            scene.add(new THREE.Points(starsGeometry, starsMaterial));
        }

        function createLighting() {
            scene.add(new THREE.AmbientLight(0x222244, 0.3));
            const sunLight = new THREE.PointLight(0xffeecc, 2.5, 800);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);
        }

        function createSun() {
            scene.add(new THREE.Mesh(new THREE.SphereGeometry(15, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffaa33 })));
            scene.add(new THREE.Mesh(new THREE.SphereGeometry(18, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff8822, transparent: true, opacity: 0.3 })));
            scene.add(new THREE.Mesh(new THREE.SphereGeometry(22, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.15 })));
        }

        function createPlanets() {
            PLANET_DATA.forEach((data, index) => {
                const planetGroup = new THREE.Group();
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(data.radius, 32, 32), new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.7, metalness: 0.1 }));
                mesh.userData = { planetIndex: index, isPlanet: true };
                planetGroup.add(mesh);

                if (data.hasRings) {
                    const ring = new THREE.Mesh(new THREE.RingGeometry(data.radius * 1.4, data.radius * 2.5, 64), new THREE.MeshBasicMaterial({ color: 0xc9b896, side: THREE.DoubleSide, transparent: true, opacity: 0.7 }));
                    ring.rotation.x = Math.PI / 2.3;
                    planetGroup.add(ring);
                }

                if (data.axialTilt) planetGroup.rotation.z = Math.PI * 0.4;

                planetGroup.userData = { angle: Math.random() * Math.PI * 2, speed: data.speed, distance: data.distance, rotationSpeed: data.rotationSpeed, data: data };
                scene.add(planetGroup);
                planets.push(planetGroup);

                createOrbit(data.distance);
                createLabel(data.name, planetGroup, data.radius);
            });

            const moonGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const moonMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.9, metalness: 0 });
            moonMesh = new THREE.Mesh(moonGeo, moonMat);
            scene.add(moonMesh);
        }

        function createOrbit(distance) {
            const points = [];
            for (let i = 0; i <= 128; i++) {
                const angle = (i / 128) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(angle) * distance, 0, Math.sin(angle) * distance));
            }
            const orbit = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.4 }));
            orbit.userData.isOrbit = true;
            scene.add(orbit);
            orbits.push(orbit);
        }

        function createLabel(name, planetGroup, radius) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 24px Courier New';
            ctx.fillStyle = '#aaccff';
            ctx.textAlign = 'center';
            ctx.fillText(name, 128, 40);

            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            sprite.scale.set(15, 4, 1);
            sprite.position.y = radius + 3;
            sprite.userData.isLabel = true;
            planetGroup.add(sprite);
            labels.push(sprite);
        }

        function createAsteroidBelt() {
            const positions = [], colors = [];
            for (let i = 0; i < 1000; i++) {
                const radius = 70 + Math.random() * 15;
                const angle = Math.random() * Math.PI * 2;
                const height = (Math.random() - 0.5) * 3;
                positions.push(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
                const b = 0.3 + Math.random() * 0.3;
                colors.push(b, b, b * 0.9);
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            asteroidBelt = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.5, vertexColors: true, transparent: true, opacity: 0.8 }));
            asteroidBelt.userData.isAsteroidBelt = true;
            scene.add(asteroidBelt);
        }

        function setupEventListeners() {
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            renderer.domElement.addEventListener('click', onMouseClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);

            document.getElementById('speed-slider').addEventListener('input', (e) => { speedMultiplier = parseFloat(e.target.value); document.getElementById('speed-value').textContent = speedMultiplier.toFixed(1) + 'x'; });
            document.getElementById('toggle-orbits').addEventListener('click', () => { orbitsVisible = !orbitsVisible; orbits.forEach(o => o.visible = orbitsVisible); });
            document.getElementById('toggle-labels').addEventListener('click', () => { labelsVisible = !labelsVisible; labels.forEach(l => l.visible = labelsVisible); });
            document.getElementById('reset-camera').addEventListener('click', () => { camera.position.copy(initialCameraPosition); controls.target.copy(initialControlsTarget); controls.update(); });
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const meshes = [];
            planets.forEach(g => g.traverse(c => { if (c.isMesh && c.userData.isPlanet) meshes.push(c); }));

            const hits = raycaster.intersectObjects(meshes);
            if (hits.length > 0) {
                const idx = hits[0].object.userData.planetIndex;
                showPlanetInfo(PLANET_DATA[idx]);
            } else {
                tooltip.classList.add('hidden');
            }
        }

        function onMouseMove(event) {
            tooltip.style.left = (event.clientX + 20) + 'px';
            tooltip.style.top = (event.clientY + 20) + 'px';
        }

        function showPlanetInfo(data) {
            tooltipName.textContent = data.name;
            tooltipStats.innerHTML = 'Diameter: <span>' + data.diameter + '</span><br>Distance from Sun: <span>' + data.distanceFromSun + '</span><br>Orbital Period: <span>' + data.orbitalPeriod + '</span>';
            tooltip.classList.remove('hidden');
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            planets.forEach(group => {
                const ud = group.userData;
                ud.angle += ud.speed * delta * speedMultiplier;
                group.position.x = Math.cos(ud.angle) * ud.distance;
                group.position.z = Math.sin(ud.angle) * ud.distance;
                group.traverse(c => { if (c.isMesh && c.userData.isPlanet) c.rotation.y += ud.rotationSpeed * delta * speedMultiplier; });
            });

            const earth = planets[2];
            if (moonMesh && earth) {
                const ma = clock.getElapsedTime() * 0.5 * speedMultiplier;
                moonMesh.position.x = earth.position.x + Math.cos(ma) * 3.5;
                moonMesh.position.z = earth.position.z + Math.sin(ma) * 3.5;
                moonMesh.position.y = 0;
            }

            if (asteroidBelt) asteroidBelt.rotation.y += 0.0001 * delta * speedMultiplier;

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
